<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Cinema — Бек-офіс каталогу</title>
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #1f1f1f;
            --accent-color: #e50914;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 2px solid var(--card-bg); margin-bottom: 30px; }
        h1 { color: var(--accent-color); font-size: 28px; font-weight: bold; }
        
        .search-container { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 15px; background: var(--card-bg); border: 2px solid #333; color: white; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 10px rgba(229, 9, 20, 0.5); }

        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: transform 0.2s, box-shadow 0.2s; }
        .movie-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .movie-poster { width: 100%; height: 350px; object-fit: cover; background: #2c2c2c; }
        .movie-info { padding: 15px; }
        .movie-title { font-size: 18px; margin-bottom: 8px; font-weight: bold; }
        .movie-meta { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-muted); margin-bottom: 10px; }
        .movie-rating { color: #ffb400; font-weight: bold; }
        .movie-desc { font-size: 14px; color: var(--text-muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .error-msg { color: var(--accent-color); font-weight: bold; margin-top: 10px; font-size: 16px; }
        
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <h1>ABSOLUTE CINEMA</h1>
        <div id="user-profile">🔑 Модератор: Daniel_Sinhkh (FRONTEND)</div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="search-title" oninput="liveSearch()" placeholder="Почніть вводити назву фільму для динамічної фільтрації (наприклад: Matrix, Inception)..." autocomplete="off">
        </div>
        <div id="error-container" class="error-msg"></div>

        <div class="movies-grid" id="movies-container">
            </div>
    </main>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/movies";

        // Асинхронний живий пошук у реальному часі (DSN-5)
        async function liveSearch() {
            const query = document.getElementById('search-title').value.trim();
            document.getElementById('error-container').innerText = "";
            
            try {
                let url = API_URL;
                if (query) {
                    url += `?title=${encodeURIComponent(query)}`;
                }
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "Нічого не знайдено");
                }
                
                const movies = await response.json();
                renderMovies(movies);
            } catch (error) {
                document.getElementById('movies-container').innerHTML = "";
                document.getElementById('error-container').innerText = `❌ ${error.message}`;
            }
        }

        // Рендеринг карток фільмів у DOM
        function renderMovies(movies) {
            const container = document.getElementById('movies-container');
            container.innerHTML = movies.map(movie => `
                <div class="movie-card">
                    <img src="${movie.poster_url}" class="movie-poster" alt="${movie.title}">
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta">
                            <span>📅 ${movie.year} | 🎬 ${movie.genre}</span>
                            <span class="movie-rating">⭐ ${movie.rating}</span>
                        </div>
                        <div class="movie-desc">${movie.description}</div>
                    </div>
                </div>
            `).join('');
        }

        // Первинне завантаження каталогу
        window.onload = liveSearch;
    </script>
</body>
</html>
