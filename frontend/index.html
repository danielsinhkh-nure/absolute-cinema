<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absolute Cinema — Бек-офіс</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --card:      #1a1a24;
      --border:    #2a2a3a;
      --accent:    #e50914;
      --accent2:   #ff6b35;
      --gold:      #f5c842;
      --text:      #f0f0f5;
      --muted:     #888899;
      --success:   #22c55e;
      --radius:    10px;
      --transition: 0.22s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(229,9,20,0.15);
      border: 1px solid rgba(229,9,20,0.3);
      color: #ff6b6b;
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }
    .btn-add:hover { background: #c5070f; transform: translateY(-1px); }

    /* ── MAIN LAYOUT ── */
    main { padding: 28px 32px; max-width: 1600px; margin: 0 auto; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; }
    .stat-value.red { color: var(--accent); }
    .stat-value.gold { color: var(--gold); }
    .stat-value.green { color: var(--success); }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
    }

    select {
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    select:focus { outline: none; border-color: var(--accent); }

    /* ── GENRE PILLS ── */
    .genre-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .pill {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }

    /* ── GRID ── */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .movie-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      display: flex;
      flex-direction: column;
    }
    .movie-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      border-color: rgba(229,9,20,0.4);
    }

    .poster-wrap { position: relative; overflow: hidden; }
    .movie-poster {
      width: 100%;
      height: 310px;
      object-fit: cover;
      display: block;
      background: var(--surface);
      transition: transform 0.4s ease;
    }
    .movie-card:hover .movie-poster { transform: scale(1.04); }

    .poster-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,15,0.95) 0%, transparent 55%);
      opacity: 0;
      transition: opacity var(--transition);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 16px;
      gap: 10px;
    }
    .movie-card:hover .poster-overlay { opacity: 1; }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: transform var(--transition), background var(--transition);
    }
    .btn-icon:hover { transform: scale(1.15); }
    .btn-edit { background: rgba(245,200,66,0.2); color: var(--gold); }
    .btn-edit:hover { background: rgba(245,200,66,0.35); }
    .btn-delete { background: rgba(229,9,20,0.2); color: #ff6b6b; }
    .btn-delete:hover { background: rgba(229,9,20,0.4); }

    .genre-tag {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .movie-info { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .movie-title { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .movie-meta { display: flex; justify-content: space-between; align-items: center; }
    .movie-year { font-size: 12px; color: var(--muted); }
    .movie-rating { font-size: 13px; font-weight: 700; color: var(--gold); }
    .movie-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: 2px;
    }

    /* ── EMPTY / ERROR ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
    }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 22px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; color: var(--muted); }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-bottom: 40px;
    }
    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .page-info { font-size: 13px; color: var(--muted); padding: 0 8px; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast-item {
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(8px);
      border: 1px solid;
      animation: slideIn 0.3s ease;
      max-width: 320px;
    }
    .toast-item.success { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #86efac; }
    .toast-item.error   { background: rgba(229,9,20,0.15); border-color: rgba(229,9,20,0.4); color: #fca5a5; }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 520px;
      padding: 28px;
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    .modal-title { font-size: 20px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    .modal-close:hover { color: var(--text); border-color: var(--accent); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .form-input {
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(229,9,20,0.12);
    }
    textarea.form-input { resize: vertical; min-height: 80px; }

    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
    .btn-secondary {
      padding: 10px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-primary {
      padding: 10px 22px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
    }
    .btn-primary:hover { background: #c5070f; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { height: 380px; }

    /* ── CONFIRM DIALOG ── */
    .confirm-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .confirm-backdrop.open { display: flex; }
    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      max-width: 380px;
      width: 90%;
      animation: modalIn 0.2s ease;
      text-align: center;
    }
    .confirm-icon { font-size: 42px; margin-bottom: 12px; }
    .confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .confirm-text { font-size: 14px; color: var(--muted); margin-bottom: 22px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-danger { padding: 10px 22px; background: var(--accent); border: none; border-radius: var(--radius); color: white; font-weight: 600; cursor: pointer; transition: background var(--transition); }
    .btn-danger:hover { background: #c5070f; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      header { padding: 0 16px; }
      main   { padding: 16px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">ABSOLUTE CINEMA</div>
  <div class="header-right">
    <span class="badge">🔑 Модератор: Daniel_Sinhkh</span>
    <button class="btn-add" onclick="openModal()">
      <span>＋</span> Додати фільм
    </button>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- STATS -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card"><div class="stat-label">Всього фільмів</div><div class="stat-value red" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Середній рейтинг</div><div class="stat-value gold" id="stat-avg">—</div></div>
    <div class="stat-card"><div class="stat-label">Найстаріший рік</div><div class="stat-value" id="stat-oldest">—</div></div>
    <div class="stat-card"><div class="stat-label">Жанрів</div><div class="stat-value green" id="stat-genres">—</div></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Пошук за назвою…" autocomplete="off" oninput="onFilterChange()" />
    </div>
    <select id="sort-select" onchange="onFilterChange()">
      <option value="rating|desc">⭐ Рейтинг ↓</option>
      <option value="rating|asc">⭐ Рейтинг ↑</option>
      <option value="year|desc">📅 Рік ↓</option>
      <option value="year|asc">📅 Рік ↑</option>
      <option value="title|asc">🔤 Назва А→Я</option>
      <option value="title|desc">🔤 Назва Я→А</option>
    </select>
    <select id="rating-filter" onchange="onFilterChange()">
      <option value="">Будь-який рейтинг</option>
      <option value="9">9+ ⭐⭐⭐</option>
      <option value="8">8+ ⭐⭐</option>
      <option value="7">7+ ⭐</option>
    </select>
  </div>

  <!-- GENRE PILLS -->
  <div class="genre-pills" id="genre-pills"></div>

  <!-- GRID -->
  <div class="movies-grid" id="movies-grid"></div>

  <!-- PAGINATION -->
  <div class="pagination" id="pagination"></div>

</main>

<!-- TOAST -->
<div id="toast"></div>

<!-- ADD/EDIT MODAL -->
<div class="modal-backdrop" id="movie-modal" onclick="onBackdropClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Новий фільм</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group full">
        <label class="form-label">Назва *</label>
        <input class="form-input" id="f-title" type="text" placeholder="Назва фільму" />
      </div>
      <div class="form-group">
        <label class="form-label">Рік *</label>
        <input class="form-input" id="f-year" type="number" placeholder="2024" min="1888" max="2030" />
      </div>
      <div class="form-group">
        <label class="form-label">Жанр *</label>
        <input class="form-input" id="f-genre" type="text" placeholder="Sci-Fi" />
      </div>
      <div class="form-group full">
        <label class="form-label">Рейтинг (0–10) *</label>
        <input class="form-input" id="f-rating" type="number" step="0.1" min="0" max="10" placeholder="8.5" />
      </div>
      <div class="form-group full">
        <label class="form-label">Посилання на постер *</label>
        <input class="form-input" id="f-poster" type="url" placeholder="https://…" />
      </div>
      <div class="form-group full">
        <label class="form-label">Опис *</label>
        <textarea class="form-input" id="f-desc" placeholder="Короткий опис фільму…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Скасувати</button>
      <button class="btn-primary" id="modal-submit" onclick="submitMovie()">Зберегти</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-backdrop" id="confirm-modal">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Видалити фільм?</div>
    <div class="confirm-text" id="confirm-text">Цю дію неможливо скасувати.</div>
    <div class="confirm-actions">
      <button class="btn-secondary" onclick="closeConfirm()">Скасувати</button>
      <button class="btn-danger" id="confirm-ok">Видалити</button>
    </div>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000/api";

  // ── State ──────────────────────────────────────────────────────────────────
  let state = {
    movies: [],
    genres: [],
    total: 0,
    totalPages: 1,
    page: 1,
    pageSize: 12,
    genre: null,
    editingId: null,
    deleteId: null,
    loading: false,
  };

  // ── Bootstrap ──────────────────────────────────────────────────────────────
  window.onload = async () => {
    await loadGenres();
    await loadMovies();
    await loadStats();
  };

  // ── Helpers ────────────────────────────────────────────────────────────────
  function getFilters() {
    const [sort_by, sort_order] = document.getElementById('sort-select').value.split('|');
    return {
      title:      document.getElementById('search-input').value.trim() || null,
      genre:      state.genre,
      rating_min: document.getElementById('rating-filter').value || null,
      sort_by,
      sort_order,
      page:       state.page,
      page_size:  state.pageSize,
    };
  }

  function buildQuery(params) {
    const q = new URLSearchParams();
    for (const [k, v] of Object.entries(params)) {
      if (v !== null && v !== undefined) q.set(k, v);
    }
    return q.toString();
  }

  // ── Load genres ────────────────────────────────────────────────────────────
  async function loadGenres() {
    try {
      const r = await fetch(`${API}/movies/genres`);
      state.genres = await r.json();
      renderGenrePills();
    } catch {}
  }

  function renderGenrePills() {
    const el = document.getElementById('genre-pills');
    const pills = ['Всі', ...state.genres].map(g => {
      const active = (g === 'Всі' && !state.genre) || g === state.genre;
      return `<span class="pill ${active ? 'active' : ''}" onclick="setGenre(${g === 'Всі' ? 'null' : `'${g}'`})">${g}</span>`;
    });
    el.innerHTML = pills.join('');
  }

  function setGenre(g) {
    state.genre = g;
    state.page = 1;
    renderGenrePills();
    loadMovies();
  }

  // ── Load movies ────────────────────────────────────────────────────────────
  async function loadMovies() {
    if (state.loading) return;
    state.loading = true;
    showSkeletons();

    try {
      const qs = buildQuery(getFilters());
      const r = await fetch(`${API}/movies?${qs}`);
      if (!r.ok) throw new Error((await r.json()).detail || 'Помилка сервера');
      const data = await r.json();
      state.movies     = data.movies;
      state.total      = data.total;
      state.totalPages = data.total_pages;
      renderMovies();
      renderPagination();
    } catch (err) {
      document.getElementById('movies-grid').innerHTML =
        `<div class="empty-state"><div class="icon">🔌</div><h3>Сервер недоступний</h3><p>${err.message}</p></div>`;
    } finally {
      state.loading = false;
    }
  }

  // ── Stats ──────────────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const r = await fetch(`${API}/movies?page_size=100`);
      const data = await r.json();
      const all = data.movies;
      document.getElementById('stat-total').textContent   = data.total;
      document.getElementById('stat-avg').textContent     = all.length ? (all.reduce((s, m) => s + m.rating, 0) / all.length).toFixed(1) : '—';
      document.getElementById('stat-oldest').textContent  = all.length ? Math.min(...all.map(m => m.year)) : '—';
      document.getElementById('stat-genres').textContent  = state.genres.length;
    } catch {}
  }

  // ── Render movies ──────────────────────────────────────────────────────────
  function renderMovies() {
    const grid = document.getElementById('movies-grid');
    if (!state.movies.length) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><h3>Нічого не знайдено</h3><p>Спробуйте змінити фільтри або додайте новий фільм.</p></div>`;
      return;
    }
    grid.innerHTML = state.movies.map(m => `
      <div class="movie-card">
        <div class="poster-wrap">
          <img class="movie-poster" src="${esc(m.poster_url)}" alt="${esc(m.title)}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22310%22><rect width=%22400%22 height=%22310%22 fill=%22%231a1a24%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23555%22 font-size=%2248%22 text-anchor=%22middle%22 dy=%22.3em%22>🎬</text></svg>'" />
          <span class="genre-tag">${esc(m.genre)}</span>
          <div class="poster-overlay">
            <button class="btn-icon btn-edit" onclick="openEditModal(${m.id})" title="Редагувати">✏️</button>
            <button class="btn-icon btn-delete" onclick="confirmDelete(${m.id}, '${esc(m.title)}')" title="Видалити">🗑️</button>
          </div>
        </div>
        <div class="movie-info">
          <div class="movie-title">${esc(m.title)}</div>
          <div class="movie-meta">
            <span class="movie-year">📅 ${m.year}</span>
            <span class="movie-rating">⭐ ${m.rating}</span>
          </div>
          <div class="movie-desc">${esc(m.description)}</div>
        </div>
      </div>
    `).join('');
  }

  function showSkeletons() {
    const grid = document.getElementById('movies-grid');
    grid.innerHTML = Array(8).fill(`<div class="skeleton skeleton-card"></div>`).join('');
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Pagination ─────────────────────────────────────────────────────────────
  function renderPagination() {
    const el = document.getElementById('pagination');
    if (state.totalPages <= 1) { el.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${state.page - 1})" ${state.page === 1 ? 'disabled' : ''}>‹</button>`;
    for (let p = 1; p <= state.totalPages; p++) {
      if (p === 1 || p === state.totalPages || Math.abs(p - state.page) <= 1) {
        html += `<button class="page-btn ${p === state.page ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
      } else if (Math.abs(p - state.page) === 2) {
        html += `<span class="page-info">…</span>`;
      }
    }
    html += `<button class="page-btn" onclick="goPage(${state.page + 1})" ${state.page === state.totalPages ? 'disabled' : ''}>›</button>`;
    html += `<span class="page-info">${state.total} фільмів</span>`;
    el.innerHTML = html;
  }

  function goPage(p) {
    if (p < 1 || p > state.totalPages) return;
    state.page = p;
    loadMovies();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Filter change ──────────────────────────────────────────────────────────
  let debounceTimer;
  function onFilterChange() {
    clearTimeout(debounceTimer);
    state.page = 1;
    debounceTimer = setTimeout(loadMovies, 280);
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  function openModal(movie = null) {
    state.editingId = movie ? movie.id : null;
    document.getElementById('modal-title').textContent   = movie ? 'Редагувати фільм' : 'Новий фільм';
    document.getElementById('modal-submit').textContent  = movie ? 'Зберегти зміни' : 'Додати фільм';
    document.getElementById('f-title').value  = movie?.title  || '';
    document.getElementById('f-year').value   = movie?.year   || '';
    document.getElementById('f-genre').value  = movie?.genre  || '';
    document.getElementById('f-rating').value = movie?.rating || '';
    document.getElementById('f-poster').value = movie?.poster_url || '';
    document.getElementById('f-desc').value   = movie?.description || '';
    document.getElementById('movie-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('movie-modal').classList.remove('open');
    state.editingId = null;
  }

  function onBackdropClick(e) {
    if (e.target === document.getElementById('movie-modal')) closeModal();
  }

  async function openEditModal(id) {
    try {
      const r = await fetch(`${API}/movies/${id}`);
      const movie = await r.json();
      openModal(movie);
    } catch { toast('Не вдалося завантажити дані фільму', 'error'); }
  }

  async function submitMovie() {
    const btn = document.getElementById('modal-submit');
    const payload = {
      title:       document.getElementById('f-title').value.trim(),
      year:        parseInt(document.getElementById('f-year').value),
      genre:       document.getElementById('f-genre').value.trim(),
      rating:      parseFloat(document.getElementById('f-rating').value),
      poster_url:  document.getElementById('f-poster').value.trim(),
      description: document.getElementById('f-desc').value.trim(),
    };

    if (!payload.title || !payload.year || !payload.genre || isNaN(payload.rating) || !payload.poster_url || !payload.description) {
      toast('Заповніть усі поля', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Збереження…';

    try {
      const url     = state.editingId ? `${API}/movies/${state.editingId}` : `${API}/movies`;
      const method  = state.editingId ? 'PUT' : 'POST';
      const r       = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

      if (!r.ok) {
        const err = await r.json();
        throw new Error(err.detail || 'Помилка');
      }

      closeModal();
      toast(state.editingId ? 'Фільм оновлено ✓' : 'Фільм додано ✓', 'success');
      await loadGenres();
      await loadMovies();
      await loadStats();
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = state.editingId ? 'Зберегти зміни' : 'Додати фільм';
    }
  }

  // ── Confirm delete ─────────────────────────────────────────────────────────
  function confirmDelete(id, title) {
    state.deleteId = id;
    document.getElementById('confirm-text').textContent = `Видалити «${title}»? Цю дію неможливо скасувати.`;
    document.getElementById('confirm-ok').onclick = doDelete;
    document.getElementById('confirm-modal').classList.add('open');
  }

  function closeConfirm() {
    document.getElementById('confirm-modal').classList.remove('open');
    state.deleteId = null;
  }

  async function doDelete() {
    if (!state.deleteId) return;
    try {
      const r = await fetch(`${API}/movies/${state.deleteId}`, { method: 'DELETE' });
      if (r.status !== 204) throw new Error('Помилка видалення');
      closeConfirm();
      toast('Фільм видалено', 'success');
      if (state.movies.length === 1 && state.page > 1) state.page--;
      await loadGenres();
      await loadMovies();
      await loadStats();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast-item ${type}`;
    el.textContent = msg;
    document.getElementById('toast').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // ── Keyboard ───────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeConfirm(); }
  });
</script>
</body>
</html>
